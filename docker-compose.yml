# Production stack: MongoDB, Redis, API, Next.js, Caddy (HTTPS).
# Env files live under deploy/env/ (tracked) so clone + compose works without extra copies.
# Edit CHANGE_ME values on the server before going live (see deploy/DIGITALOCEAN.md).
# Optional: copy these to wapi-api/.env.production etc. and change env_file paths for gitignored secrets.
# Usage on Droplet:
#   1. Point DNS: botfeed.io, www, api.botfeed.io, dashboard.botfeed.io → server IP.
#   2. Edit deploy/env/*.example secrets on the server (or use copies + env_file override).
#   3. docker compose up -d --build
#
# Google Cloud Console — Authorized redirect URI:
#   https://api.botfeed.io/api/google/callback

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./wapi-api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./deploy/env/wapi-api.env.production.example
    environment:
      NODE_ENV: production
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/wapi
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - api_uploads:/app/uploads
    expose:
      - "5000"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./Wapi-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.botfeed.io/api
        NEXT_PUBLIC_API_BASE_URL: https://api.botfeed.io/api
        NEXT_PUBLIC_STORAGE_URL: https://api.botfeed.io
        NEXT_PUBLIC_SOCKET_URL: https://api.botfeed.io
    restart: unless-stopped
    env_file:
      - ./deploy/env/wapi-frontend.env.production.example
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - api

  admin:
    build:
      context: ./Wapi-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.botfeed.io/api
        NEXT_PUBLIC_API_BASE_URL: https://api.botfeed.io/api
        NEXT_PUBLIC_STORAGE_URL: https://api.botfeed.io
    restart: unless-stopped
    env_file:
      - ./deploy/env/wapi-admin.env.production.example
    environment:
      NODE_ENV: production
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      - api

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin
      - api

volumes:
  mongo_data:
  redis_data:
  api_uploads:
  caddy_data:
  caddy_config:
